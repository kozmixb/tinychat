<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TinyChat</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1417;
      --panel: #182126;
      --panel-2: #223039;
      --panel-3: #2b3b43;
      --text: #edf7f4;
      --muted: #9fb2b0;
      --line: #38515a;
      --soft-line: #263840;
      --accent: #6ee7c8;
      --accent-strong: #9ff5dd;
      --accent-text: #052018;
      --warning: #ffbf69;
      --danger: #ff8b91;
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    ::selection {
      background: rgba(110, 231, 200, .28);
      color: var(--text);
    }
    body {
      margin: 0;
      font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }
    button, textarea, input {
      font: inherit;
      color: inherit;
    }
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      background: var(--panel-2);
      border-radius: 999px;
      width: 34px;
      height: 34px;
      padding: 0;
      cursor: pointer;
      transition: background .15s ease, color .15s ease, opacity .15s ease;
    }
    button:hover { background: var(--panel-3); }
    button.primary { background: var(--accent); color: var(--accent-text); }
    button.primary:hover { background: var(--accent-strong); }
    button.temporary {
      background: var(--warning);
      color: #221506;
    }
    button.temporary:hover { background: #ffd08d; }
    button.wide {
      width: auto;
      padding: 0 16px;
      font-weight: 650;
    }
    button svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    #attach svg {
      width: 23px;
      height: 23px;
      stroke-width: 2.4;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: .55;
    }
    button:focus-visible,
    textarea:focus-visible,
    input:focus-visible {
      outline: 2px solid rgba(110, 231, 200, .72);
      outline-offset: 2px;
    }
    .app {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      height: 100vh;
      padding: 24px;
    }
    .app.empty-chat {
      grid-template-rows: auto auto;
      align-content: center;
      gap: 20px;
    }
    .app.empty-chat .stage {
      overflow: visible;
      padding: 0;
    }
    .app.empty-chat .messages {
      padding: 0;
    }
    .app.empty-chat .empty {
      min-height: auto;
    }
    h1 {
      font-size: 30px;
      line-height: 1.15;
      margin: 0;
      font-weight: 700;
      letter-spacing: 0;
      color: var(--text);
    }
    .subtitle {
      margin-top: 7px;
      color: var(--muted);
      font-size: 18px;
    }
    .stage {
      min-height: 0;
      overflow: auto;
      padding: 0 0 24px;
      scroll-behavior: smooth;
      scrollbar-color: var(--line) transparent;
    }
    .messages {
      display: grid;
      gap: 16px;
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 0;
    }
    .empty {
      display: grid;
      place-items: center;
      min-height: calc(100vh - 280px);
      text-align: center;
    }
    .empty h1 {
      color: var(--accent-strong);
    }
    .msg {
      position: relative;
      display: grid;
      gap: 7px;
      align-items: start;
    }
    .msg-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 24px;
      color: var(--muted);
    }
    .msg-actions {
      display: inline-flex;
      gap: 4px;
    }
    .msg-action {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      padding: 0;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
    }
    .msg-action svg {
      width: 13px;
      height: 13px;
    }
    .msg-action span {
      margin-left: 4px;
    }
    .msg-action:hover {
      background: var(--panel-2);
      color: var(--text);
    }
    .thinking {
      color: var(--muted);
      font-size: 12px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      border-left: 2px solid var(--soft-line);
      padding-left: 10px;
    }
    .thinking-wrap {
      position: sticky;
      top: 0;
      z-index: 2;
      display: grid;
      gap: 6px;
      padding: 5px 0 8px;
      background: var(--bg);
    }
    .thinking-toggle {
      justify-self: start;
      width: auto;
      height: 24px;
      border-radius: 6px;
      padding: 0 7px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
    }
    .thinking-toggle span {
      margin-left: 5px;
    }
    .thinking-toggle:hover {
      background: var(--panel-2);
      color: var(--text);
    }
    .thinking-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .thinking-label svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .stats {
      display: inline-flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
    }
    .stat {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
    }
    .stat svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .bubble {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      border-radius: 18px;
      padding: 12px 14px;
      max-width: 100%;
    }
    .bubble pre {
      margin: 10px 0;
      padding: 12px;
      overflow: auto;
      background: #0c1214;
      border: 1px solid var(--soft-line);
      border-radius: 8px;
      white-space: pre;
    }
    .bubble code {
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
    }
    .bubble :not(pre) > code {
      padding: 2px 4px;
      border-radius: 4px;
      background: #0c1214;
      color: #b8f3e5;
    }
    .bubble p {
      margin: 0 0 10px;
    }
    .bubble p:last-child {
      margin-bottom: 0;
    }
    .bubble ul,
    .bubble ol {
      margin: 8px 0 10px 20px;
      padding: 0;
    }
    .bubble li {
      margin: 3px 0;
    }
    .bubble h1,
    .bubble h2,
    .bubble h3,
    .bubble h4,
    .bubble h5,
    .bubble h6 {
      margin: 14px 0 8px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    .bubble h1 { font-size: 22px; }
    .bubble h2 { font-size: 19px; }
    .bubble h3 { font-size: 16px; }
    .bubble h4,
    .bubble h5,
    .bubble h6 { font-size: 14px; }
    .bubble hr {
      border: 0;
      border-top: 1px solid var(--soft-line);
      margin: 14px 0;
    }
    .bubble blockquote {
      margin: 8px 0 10px;
      padding-left: 10px;
      border-left: 2px solid var(--soft-line);
      color: var(--muted);
    }
    .code-block {
      position: relative;
      margin: 10px 0;
    }
    .code-copy {
      position: absolute;
      top: 8px;
      right: 8px;
      width: auto;
      height: 24px;
      padding: 0 8px;
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 11px;
    }
    .code-copy:hover {
      background: var(--panel-3);
      color: var(--text);
    }
    .msg.user .bubble {
      justify-self: end;
      background: var(--panel);
      border: 1px solid var(--soft-line);
      max-width: min(620px, 85%);
    }
    .msg.assistant .bubble {
      padding-left: 0;
    }
    .msg.assistant .bubble h1,
    .msg.assistant .bubble h2,
    .msg.assistant .bubble h3 {
      color: #d7fff3;
    }
    .composer {
      width: min(768px, calc(100vw - 48px));
      margin: 0 auto;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: var(--radius);
      min-height: 112px;
      padding: 12px;
      box-shadow: 0 18px 50px rgba(3, 14, 18, .32);
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .composer:focus-within {
      border-color: rgba(110, 231, 200, .74);
      box-shadow: 0 18px 52px rgba(3, 14, 18, .38), 0 0 0 3px rgba(110, 231, 200, .1);
    }
    .composer-shell {
      width: 100%;
      will-change: transform;
    }
    .setup {
      width: min(768px, calc(100vw - 48px));
      margin: 0 auto 12px;
      display: none;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }
    .setup.visible {
      display: grid;
    }
    .setup input {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      outline: 0;
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 0 14px;
    }
    .setup button {
      width: auto;
      padding: 0 14px;
      font-weight: 650;
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(5, 12, 15, .78);
    }
    .modal-backdrop.visible {
      display: grid;
    }
    .modal {
      width: min(460px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #151e23;
      box-shadow: 0 22px 70px rgba(0, 0, 0, .48);
      padding: 20px;
    }
    .modal-header {
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .warning-icon {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      color: var(--warning);
    }
    .warning-icon svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .modal h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    .modal p {
      margin: 0 0 16px;
      color: var(--muted);
      text-align: left;
    }
    .modal p span {
      display: block;
      margin-top: 6px;
    }
    .modal p span:first-child {
      margin-top: 0;
    }
    .modal code {
      color: var(--text);
      font-size: 12px;
    }
    .modal form {
      display: grid;
      gap: 10px;
    }
    .modal input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      outline: 0;
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      padding: 0 12px;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
    }
    .composer-inner {
      display: grid;
      grid-template-rows: minmax(42px, auto) auto;
      gap: 8px;
    }
    #prompt {
      width: 100%;
      min-height: 42px;
      max-height: 50vh;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      padding: 4px 8px;
      color: var(--text);
      font-size: 14px;
      overflow-y: hidden;
    }
    #prompt::placeholder { color: #a7a7a7; }
    .composer-actions {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 8px;
      align-items: center;
    }
    .model-wrap {
      justify-self: end;
      display: grid;
      grid-template-columns: minmax(112px, 300px);
      align-items: center;
      height: 26px;
      border-radius: 6px;
      background: #25343b;
      padding: 0 8px;
      min-width: 0;
    }
    .model-text {
      min-width: 0;
      height: 24px;
      color: var(--text);
      font-size: 12px;
      line-height: 24px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .endpoint, .status {
      color: var(--muted);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .error {
      color: var(--danger);
      font-size: 12px;
      overflow-wrap: anywhere;
      min-height: 18px;
      width: min(768px, calc(100vw - 48px));
      margin: 8px auto 0;
      text-align: left;
    }
    @media (max-width: 760px) {
      .app { padding: 14px; }
      h1 { font-size: 26px; }
      .subtitle { font-size: 15px; }
      .messages { padding-top: 14px; }
      .composer {
        width: 100%;
      }
      .setup {
        width: 100%;
        grid-template-columns: 1fr;
      }
      .composer-actions {
        grid-template-columns: auto minmax(0, 1fr) auto;
      }
      .model-wrap {
        grid-column: 2;
        max-width: 100%;
      }
      .status { display: none; }
    }
  </style>
</head>
<body>
  <div class="modal-backdrop" id="hostModal" role="dialog" aria-modal="true" aria-labelledby="hostModalTitle">
    <div class="modal">
      <div class="modal-header">
        <div class="warning-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 3 2.5 20h19L12 3Z"></path><path d="M12 9v5"></path><path d="M12 17h.01"></path></svg>
        </div>
        <h2 id="hostModalTitle">OpenAI-compatible endpoint required</h2>
      </div>
      <p>
        <span>No OpenAI-compatible endpoint was provided.</span>
        <span>You can set one for this local testing session.</span>
        <span>For production or shared deployments, configure <code>OPENAI_CHAT_HOST</code> on the host server.</span>
      </p>
      <form id="hostForm">
        <input id="runtimeEndpoint" placeholder="https://api.example.com/v1" autocomplete="url" inputmode="url">
        <div class="modal-actions">
          <button class="temporary wide" type="submit">Use for testing</button>
        </div>
      </form>
    </div>
  </div>
  <div class="app empty-chat" id="app">
    <section class="stage" id="chat">
      <div class="messages" id="messages"></div>
    </section>

    <div class="composer-shell" id="composerShell">
      <form class="composer" id="form">
        <div class="composer-inner">
          <textarea id="prompt" placeholder="Type a message..."></textarea>
          <div class="composer-actions">
            <button id="attach" type="button" title="Attach file" aria-label="Attach file">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>
            </button>
            <div class="endpoint" id="endpoint"></div>
            <div class="model-wrap">
              <div class="model-text" id="model" title="Model"></div>
            </div>
            <button class="primary" id="send" type="submit" title="Send" aria-label="Send">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>
            </button>
          </div>
        </div>
      </form>
      <input id="file" type="file" hidden multiple>
      <div class="error" id="error"></div>
    </div>
  </div>

  <script>
    const els = {
      app: document.querySelector('#app'),
      composerShell: document.querySelector('#composerShell'),
      endpoint: document.querySelector('#endpoint'),
      hostModal: document.querySelector('#hostModal'),
      hostForm: document.querySelector('#hostForm'),
      runtimeEndpoint: document.querySelector('#runtimeEndpoint'),
      model: document.querySelector('#model'),
      attach: document.querySelector('#attach'),
      file: document.querySelector('#file'),
      error: document.querySelector('#error'),
      chat: document.querySelector('#chat'),
      messages: document.querySelector('#messages'),
      form: document.querySelector('#form'),
      prompt: document.querySelector('#prompt'),
      send: document.querySelector('#send')
    };

    let messages = [];
    let controller = null;
    let configuredEndpoint = '';
    let runtimeEndpoint = '';
    let selectedModel = null;
    let renderPending = false;
    let forceNextScroll = false;
    let showThinkingByMessage = {};
    const numberFormat = new Intl.NumberFormat();
    const runtimeEndpointStorageKey = 'tinychat_runtime_endpoint';
    const runtimeEndpointStorageTtlMs = 60 * 60 * 1000;

    function setError(text) { els.error.textContent = text || ''; }
    function activateChatLayout() {
      if (!els.app.classList.contains('empty-chat')) return;
      const before = els.composerShell.getBoundingClientRect();
      els.app.classList.remove('empty-chat');
      const after = els.composerShell.getBoundingClientRect();
      const deltaY = before.top - after.top;
      els.composerShell.style.transform = 'translateY(' + deltaY + 'px)';
      els.composerShell.getBoundingClientRect();
      els.composerShell.style.transition = 'transform 320ms ease';
      els.composerShell.style.transform = 'translateY(0)';
      window.setTimeout(() => {
        els.composerShell.style.transition = '';
        els.composerShell.style.transform = '';
      }, 340);
    }
    function resizePrompt() {
      const maxHeight = Math.floor(window.innerHeight * 0.5);
      els.prompt.style.height = 'auto';
      const nextHeight = Math.min(els.prompt.scrollHeight, maxHeight);
      els.prompt.style.height = nextHeight + 'px';
      els.prompt.style.overflowY = els.prompt.scrollHeight > maxHeight ? 'auto' : 'hidden';
    }
    function nearBottom() {
      return els.chat.scrollHeight - els.chat.scrollTop - els.chat.clientHeight < 80;
    }
    function scrollBottom() { els.chat.scrollTop = els.chat.scrollHeight; }
    function activeEndpoint() { return configuredEndpoint || runtimeEndpoint; }
    function displayEndpoint(endpoint) { return endpoint.replace(/\/$/, ''); }
    function readRuntimeEndpoint() {
      try {
        const stored = JSON.parse(localStorage.getItem(runtimeEndpointStorageKey) || 'null');
        if (!stored?.endpoint || Number(stored.expiresAt) <= Date.now()) {
          localStorage.removeItem(runtimeEndpointStorageKey);
          return '';
        }
        return stored.endpoint;
      } catch {
        localStorage.removeItem(runtimeEndpointStorageKey);
        return '';
      }
    }
    function saveRuntimeEndpoint(endpoint) {
      localStorage.setItem(runtimeEndpointStorageKey, JSON.stringify({
        endpoint,
        expiresAt: Date.now() + runtimeEndpointStorageTtlMs
      }));
    }
    function showHostModal() {
      els.hostModal.classList.add('visible');
      window.setTimeout(() => els.runtimeEndpoint.focus(), 0);
    }
    function hideHostModal() {
      els.hostModal.classList.remove('visible');
    }
    function endpointHeaders() {
      const endpoint = activeEndpoint();
      return endpoint ? { 'X-OpenAI-Chat-Host': endpoint } : {};
    }
    function setModelOptions(models, placeholder) {
      const selectedId = selectedModel?.id || '';
      if (!models.length) {
        selectedModel = null;
        els.model.textContent = placeholder || 'No models found';
        els.model.title = els.model.textContent;
        return;
      }
      selectedModel = models.find(model => model.id === selectedId) || models[0];
      els.model.textContent = modelLabel(selectedModel);
      els.model.title = els.model.textContent;
    }
    function modelLabel(model) {
      const context = model.maxTokens ? ' - Context ' + numberFormat.format(model.maxTokens) : '';
      return modelDisplayName(model.id) + context;
    }
    function modelDisplayName(id) {
      return String(id).split(/[\\/]/).filter(Boolean).pop() || id;
    }
    function modelList(data) {
      if (Array.isArray(data)) {
        return data.map(modelInfo).filter(model => model.id);
      }
      if (!data || typeof data !== 'object') return [];
      const candidates = [data.data, data.models, data.model, data.tags].filter(Boolean);
      for (const candidate of candidates) {
        const items = Array.isArray(candidate) ? candidate : [candidate];
        const models = items.map(modelInfo).filter(model => model.id);
        if (models.length) return models;
      }
      return [];
    }
    function modelInfo(item) {
      if (typeof item === 'string') return { id: item, maxTokens: 0 };
      if (!item || typeof item !== 'object') return { id: '', maxTokens: 0 };
      return {
        id: item.id || item.name || item.model || item.digest || '',
        maxTokens: modelMaxTokens(item)
      };
    }
    function modelMaxTokens(item) {
      const value = item.max_tokens || item.maxTokens || item.context_length || item.contextLength || item.n_ctx || item.n_ctx_train || item.meta?.n_ctx || item.meta?.n_ctx_train || item.details?.n_ctx;
      const tokens = Number(value);
      return Number.isFinite(tokens) && tokens > 0 ? tokens : 0;
    }

    function render() {
      const shouldScroll = forceNextScroll || nearBottom();
      forceNextScroll = false;
      els.messages.innerHTML = '';
      for (const [index, msg] of messages.entries()) {
        const row = document.createElement('div');
        row.className = 'msg ' + msg.role;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = renderMarkdown(msg.content || msg.status || '');
        const showThinkingToggle = msg.reasoning && !msg.thinkingActive && msg.content;
        const showThinkingPanel = msg.reasoning && (msg.thinkingActive || showThinkingByMessage[index]);
        if (showThinkingToggle || showThinkingPanel) {
          const thinkingWrap = document.createElement('div');
          thinkingWrap.className = 'thinking-wrap';
          if (showThinkingToggle) {
            const thinkingToggle = document.createElement('button');
            thinkingToggle.className = 'thinking-toggle';
            thinkingToggle.type = 'button';
            thinkingToggle.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path><path d="M12 9a3 3 0 1 1 0 6 3 3 0 0 1 0-6Z"></path></svg><span>' + (showThinkingByMessage[index] ? 'Hide thinking' : 'Thinking') + '</span>';
            thinkingToggle.title = 'Toggle thinking';
            thinkingToggle.addEventListener('click', () => {
              showThinkingByMessage[index] = !showThinkingByMessage[index];
              render();
            });
            thinkingWrap.append(thinkingToggle);
          } else {
            const thinkingLabel = document.createElement('div');
            thinkingLabel.className = 'thinking-label';
            thinkingLabel.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path><path d="M12 9a3 3 0 1 1 0 6 3 3 0 0 1 0-6Z"></path></svg><span>Thinking</span>';
            thinkingWrap.append(thinkingLabel);
          }
          if (showThinkingPanel) {
            const thinking = document.createElement('div');
            thinking.className = 'thinking';
            thinking.textContent = msg.reasoning;
            thinkingWrap.append(thinking);
          }
          row.append(thinkingWrap);
        }
        row.append(bubble);
        const footer = document.createElement('div');
        footer.className = 'msg-footer';
        if (msg.stats) {
          const stats = document.createElement('div');
          stats.className = 'stats';
          renderStats(stats, msg.stats);
          footer.append(stats);
        }
        const actions = document.createElement('div');
        actions.className = 'msg-actions';
        if (msg.role === 'assistant' && msg.stats) {
          const copy = document.createElement('button');
          copy.className = 'msg-action';
          copy.type = 'button';
          copy.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 8h10v12H8z"></path><path d="M6 16H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1"></path></svg>';
          copy.title = 'Copy message';
          copy.setAttribute('aria-label', 'Copy message');
          copy.addEventListener('click', () => copyMessage(msg, copy));
          actions.append(copy);
        }
        if (actions.children.length) footer.append(actions);
        row.append(footer);
        els.messages.append(row);
      }
      if (!messages.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        const box = document.createElement('div');
        const title = document.createElement('h1');
        title.textContent = 'Hello there';
        const subtitle = document.createElement('div');
        subtitle.className = 'subtitle';
        subtitle.textContent = 'Type a message or upload files to get started';
        box.append(title, subtitle);
        empty.append(box);
        els.messages.append(empty);
      }
      if (shouldScroll) scrollBottom();
    }
    async function copyMessage(msg, button) {
      const parts = [];
      if (msg.content) parts.push(msg.content);
      if (msg.reasoning) parts.push('Thinking:\n' + msg.reasoning);
      const text = parts.join('\n\n') || msg.status || '';
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        const original = button.innerHTML;
        button.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6 9 17l-5-5"></path></svg>';
        window.setTimeout(() => { button.innerHTML = original; }, 900);
      } catch {
        setError('Copy failed.');
      }
    }
    function scheduleRender() {
      if (renderPending) return;
      renderPending = true;
      requestAnimationFrame(() => {
        renderPending = false;
        render();
      });
    }

    async function loadConfig() {
      const res = await fetch('/api/config');
      if (!res.ok) throw new Error('config request failed');
      const cfg = await res.json();
      configuredEndpoint = cfg.openai_chat_host || '';
      if (configuredEndpoint) {
        els.endpoint.textContent = displayEndpoint(configuredEndpoint);
        hideHostModal();
      } else {
        runtimeEndpoint = readRuntimeEndpoint();
        if (runtimeEndpoint) {
          els.runtimeEndpoint.value = runtimeEndpoint;
          els.endpoint.textContent = displayEndpoint(runtimeEndpoint);
          hideHostModal();
        } else {
          els.endpoint.textContent = 'testing endpoint required';
          showHostModal();
        }
      }
    }

    async function loadModels() {
      if (!activeEndpoint()) {
        setModelOptions([], 'No endpoint');
        showHostModal();
        return;
      }
      setModelOptions([], 'Loading...');
      await checkHealth();
      const res = await fetch('/api/models', { headers: endpointHeaders() });
      const body = await res.text();
      if (!res.ok) throw new Error(body || 'model lookup failed');
      let data;
      try {
        data = JSON.parse(body);
      } catch {
        throw new Error('model lookup returned invalid JSON');
      }
      setModelOptions(modelList(data), 'No models found');
    }

    async function checkHealth() {
      const res = await fetch('/api/health', { headers: endpointHeaders() });
      const body = await res.text();
      if (!res.ok) throw new Error(body || 'health check failed');
    }

    async function sendMessage(text) {
      setError('');
      const model = selectedModel?.id || '';
      if (!activeEndpoint()) {
        setError('Provide an OpenAI-compatible API host first.');
        showHostModal();
        return;
      }
      if (!model) {
        setError('Select a model first.');
        return;
      }

      activateChatLayout();
      messages.push({ role: 'user', content: text });
      messages.push({ role: 'assistant', content: '', reasoning: '', thinkingActive: false, done: false });
      forceNextScroll = true;
      render();

      const requestMessages = messages.slice(0, -1).map(msg => ({
        role: msg.role,
        content: msg.content || ''
      }));

      controller = new AbortController();
      els.send.disabled = true;
      els.send.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"></path></svg>';
      els.send.title = 'Stop';
      els.send.setAttribute('aria-label', 'Stop');

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...endpointHeaders() },
          body: JSON.stringify({
            model,
            messages: requestMessages,
            stream: true
          }),
          signal: controller.signal
        });
        if (!res.ok || !res.body) throw new Error(await res.text());

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (!line.startsWith('data:')) continue;
            const data = line.slice(5).trim();
            if (!data) continue;
            if (data === '[DONE]') {
              messages[messages.length - 1].done = true;
              messages[messages.length - 1].thinkingActive = false;
              messages[messages.length - 1].status = '';
              scheduleRender();
              continue;
            }
            const chunk = JSON.parse(data);
            const delta = chunk.choices?.[0]?.delta?.content || chunk.choices?.[0]?.message?.content || '';
            const reasoning = chunk.choices?.[0]?.delta?.reasoning_content || '';
            const finishReason = chunk.choices?.[0]?.finish_reason || '';
            const timings = chunk.timings;
            if (reasoning) {
              messages[messages.length - 1].reasoning += reasoning;
              messages[messages.length - 1].thinkingActive = true;
              if (!messages[messages.length - 1].content) {
                messages[messages.length - 1].status = 'Thinking...';
              }
              scheduleRender();
            }
            if (delta) {
              messages[messages.length - 1].thinkingActive = false;
              messages[messages.length - 1].content += delta;
              messages[messages.length - 1].status = '';
              scheduleRender();
            }
            if (timings) {
              messages[messages.length - 1].stats = timingStats(timings);
              scheduleRender();
            }
            if (finishReason) {
              messages[messages.length - 1].done = true;
              messages[messages.length - 1].thinkingActive = false;
              messages[messages.length - 1].status = '';
              scheduleRender();
            }
          }
        }
      } catch (err) {
        if (err.name !== 'AbortError') {
          setError(String(err.message || err));
        }
      } finally {
        controller = null;
        els.send.disabled = false;
        els.send.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>';
        els.send.title = 'Send';
        els.send.setAttribute('aria-label', 'Send');
        els.prompt.focus();
      }
    }
    function timingStats(timings) {
      const promptTokens = Number(timings.prompt_n || 0);
      const generatedTokens = Number(timings.predicted_n || 0);
      const promptSpeed = Number(timings.prompt_per_second || 0);
      const generatedSpeed = Number(timings.predicted_per_second || 0);
      const promptMs = Number(timings.prompt_ms || 0);
      const generatedMs = Number(timings.predicted_ms || 0);
      const totalMs = Number(timings.total_ms || 0) || promptMs + generatedMs;
      return [
        promptSpeed > 0 ? { icon: 'processing', label: 'Processing speed', value: promptSpeed.toFixed(1) + ' t/s' } : null,
        generatedSpeed > 0 ? { icon: 'generation', label: 'Generation speed', value: generatedSpeed.toFixed(1) + ' t/s' } : null,
        promptTokens + generatedTokens > 0 ? { icon: 'tokens', label: 'Total tokens', value: numberFormat.format(promptTokens + generatedTokens) + ' tokens' } : null,
        totalMs > 0 ? { icon: 'time', label: 'Total time', value: timeLabel(totalMs) } : null
      ].filter(Boolean);
    }
    function renderStats(container, stats) {
      for (const stat of stats) {
        const item = document.createElement('span');
        item.className = 'stat';
        item.title = stat.label;
        item.innerHTML = statIcon(stat.icon);
        const value = document.createElement('span');
        value.textContent = stat.value;
        item.append(value);
        container.append(item);
      }
    }
    function statIcon(icon) {
      if (icon === 'processing') return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12h3"></path><path d="M17 12h3"></path><path d="M12 4v3"></path><path d="M12 17v3"></path><path d="m6.3 6.3 2.1 2.1"></path><path d="m15.6 15.6 2.1 2.1"></path><path d="m17.7 6.3-2.1 2.1"></path><path d="m8.4 15.6-2.1 2.1"></path></svg>';
      if (icon === 'generation') return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8L12 3Z"></path><path d="M19 15l.8 2.2L22 18l-2.2.8L19 21l-.8-2.2L16 18l2.2-.8L19 15Z"></path></svg>';
      if (icon === 'tokens') return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3 6 21"></path><path d="M18 3l-2 18"></path><path d="M4 9h17"></path><path d="M3 15h17"></path></svg>';
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 7v5l3 2"></path><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"></path></svg>';
    }
    function timeLabel(ms) {
      if (ms < 1000) return Math.round(ms) + ' ms';
      return (ms / 1000).toFixed(ms < 10000 ? 1 : 0) + 's';
    }
    function renderMarkdown(text) {
      if (!text) return '';
      const fence = String.fromCharCode(96, 96, 96);
      const parts = String(text).split(fence);
      return parts.map((part, index) => {
        if (index % 2) {
          const code = part.replace(/^\w+\n/, '');
          return codeBlock(code);
        }
        return renderInlineMarkdown(escapeHtml(part));
      }).join('');
    }
    function codeBlock(code) {
      return '<div class="code-block"><button class="code-copy" type="button" data-copy-code="' + encodeURIComponent(code) + '">Copy code</button><pre><code>' + escapeHtml(code) + '</code></pre></div>';
    }
    function renderInlineMarkdown(text) {
      const blocks = text.split(/\n{2,}/).filter(Boolean);
      return blocks.map(renderMarkdownBlock).join('');
    }
    function renderMarkdownBlock(block) {
      const lines = block.split('\n');
      if (/^#{1,6} /.test(lines[0])) {
        const level = Math.min(lines[0].match(/^#+/)[0].length, 6);
        const heading = '<h' + level + '>' + inlineMarkdown(lines[0].replace(/^#{1,6} /, '')) + '</h' + level + '>';
        const rest = lines.slice(1).join('\n').trim();
        return heading + (rest ? renderMarkdownBlock(rest) : '');
      }
      if (lines.length === 1 && /^[-*_]{3,}$/.test(lines[0].trim())) return '<hr>';
      if (lines.every(line => /^> ?/.test(line))) {
        return '<blockquote>' + lines.map(line => inlineMarkdown(line.replace(/^> ?/, ''))).join('<br>') + '</blockquote>';
      }
      if (lines.every(line => /^[-*] /.test(line))) {
        return '<ul>' + lines.map(line => '<li>' + inlineMarkdown(line.slice(2)) + '</li>').join('') + '</ul>';
      }
      if (lines.every(line => /^\d+\. /.test(line))) {
        return '<ol>' + lines.map(line => '<li>' + inlineMarkdown(line.replace(/^\d+\. /, '')) + '</li>').join('') + '</ol>';
      }
      return '<p>' + inlineMarkdown(lines.join('<br>')) + '</p>';
    }
    function inlineMarkdown(text) {
      const tick = String.fromCharCode(96);
      return text
        .replace(new RegExp(tick + '([^' + tick + ']+)' + tick, 'g'), '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>');
    }
    async function copyCode(button) {
      try {
        await navigator.clipboard.writeText(decodeURIComponent(button.dataset.copyCode || ''));
        button.textContent = 'Copied';
        window.setTimeout(() => { button.textContent = 'Copy code'; }, 900);
      } catch {
        setError('Copy failed.');
      }
    }
    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    els.form.addEventListener('submit', event => {
      event.preventDefault();
      if (controller) {
        controller.abort();
        return;
      }
      const text = els.prompt.value.trim();
      if (!text) return;
      els.prompt.value = '';
      resizePrompt();
      sendMessage(text);
    });
    els.prompt.addEventListener('input', resizePrompt);
    els.prompt.addEventListener('keydown', event => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        els.form.requestSubmit();
      }
    });
    els.attach.addEventListener('click', () => els.file.click());
    els.messages.addEventListener('click', event => {
      const button = event.target.closest('[data-copy-code]');
      if (button) copyCode(button);
    });
    els.hostForm.addEventListener('submit', async event => {
      event.preventDefault();
      runtimeEndpoint = els.runtimeEndpoint.value.trim();
      if (!runtimeEndpoint) {
        setError('Enter an OpenAI-compatible API host.');
        showHostModal();
        return;
      }
      els.endpoint.textContent = displayEndpoint(runtimeEndpoint);
      setError('');
      try {
        await loadModels();
        saveRuntimeEndpoint(runtimeEndpoint);
        hideHostModal();
        els.prompt.focus();
      } catch (err) {
        showHostModal();
        setError(String(err.message || err));
      }
    });
    els.file.addEventListener('change', async () => {
      const files = Array.from(els.file.files || []);
      if (!files.length) return;
      const chunks = [];
      for (const file of files) {
        if (file.type.startsWith('text/') || file.size < 512 * 1024) {
          chunks.push('File: ' + file.name + '\n' + await file.text());
        } else {
          chunks.push('File attached: ' + file.name);
        }
      }
      els.prompt.value = [els.prompt.value.trim(), ...chunks].filter(Boolean).join('\n\n');
      resizePrompt();
      els.file.value = '';
      els.prompt.focus();
    });
    window.addEventListener('resize', resizePrompt);

    (async function init() {
      try {
        await loadConfig();
        await loadModels();
        resizePrompt();
        render();
      } catch (err) {
        setError(String(err.message || err));
        resizePrompt();
        render();
      }
    })();
  </script>
</body>
</html>
