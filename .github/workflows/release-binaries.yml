name: Release Binaries

on:
  release:
    types: ["published"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          binary="tinychat"
          if [ "${GOOS}" = "windows" ]; then
            binary="tinychat.exe"
          fi
          go build -buildvcs=false -trimpath -ldflags="-s -w" -o "dist/${binary}" ./src

      - name: Package binary
        run: |
          asset="tinychat-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -9 "../${asset}.zip" tinychat.exe)
          else
            tar -C dist -czf "${asset}.tar.gz" tinychat
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: tinychat-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}
